  <!-- Bow left -->
  <ellipse cx="26" cy="22" rx="7" ry="4" fill="#F4A261" transform="rotate(-20 26 22)"/>
  <!-- Bow right -->
  <ellipse cx="38" cy="22" rx="7" ry="4" fill="#F4A261" transform="rotate(20 38 22)"/>
  <!-- Bow center -->
  <circle cx="32" cy="22" r="3.5" fill="#E07038"/>

  <!-- Heart inside box -->
  <path d="M32 44 C32 44 24 38 24 33.5 C24 30.5 26.5 28.5 32 33 C37.5 28.5 40 30.5 40 33.5 C40 38 32 44 32 44Z"
        fill="#40916C" opacity="0.7"/>
