<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Kits for Family Times">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#2D6A4F"/>

  <!-- Kit box body -->
  <rect x="14" y="28" width="36" height="22" rx="3" fill="#FEFAE0"/>

  <!-- Kit box lid -->
  <rect x="12" y="22" width="40" height="8" rx="3" fill="#F4A261"/>

  <!-- Ribbon vertical -->
  <rect x="30" y="22" width="4" height="28" fill="#E07038"/>

  <!-- Ribbon horizontal on lid -->
